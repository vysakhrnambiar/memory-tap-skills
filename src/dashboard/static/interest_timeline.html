<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interest Timeline — Memory Tap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f0f23;
            --card-bg: #1a1a2e;
            --text: #e0e0e0;
            --text-dim: #888;
            --accent: #7c3aed;
            --accent-hover: #6d28d9;
            --border: rgba(124, 58, 237, 0.2);

            --color-emerging: #22c55e;
            --color-active: #7c3aed;
            --color-core: #eab308;
            --color-fading: #6b7280;
            --color-dormant: #374151;

            --day-width: 130px;
        }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
        }

        /* ── Header ─────────────────────────────────────── */
        .header {
            height: 56px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; border-bottom: 1px solid rgba(124,58,237,0.15);
            background: linear-gradient(180deg, #161630 0%, var(--bg) 100%);
            position: relative; z-index: 20;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
        .header h1 span { color: var(--accent); }
        .header .meta { font-size: 12px; color: var(--text-dim); }
        .header .meta b { color: var(--accent); font-weight: 600; }
        .back-link {
            color: var(--text-dim); text-decoration: none; font-size: 13px;
            transition: color 0.2s;
        }
        .back-link:hover { color: var(--accent); }

        /* ── Scroll controls ────────────────────────────── */
        .scroll-controls {
            display: flex; align-items: center; gap: 6px;
        }
        .scroll-btn {
            width: 36px; height: 36px; border: 1px solid rgba(124,58,237,0.3);
            border-radius: 8px; background: var(--card-bg); color: var(--text);
            cursor: pointer; font-size: 14px; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .scroll-btn:hover { background: var(--accent); border-color: var(--accent); }
        .scroll-btn.active { background: var(--accent); border-color: var(--accent); }

        /* ── Insight card ───────────────────────────────── */
        .insight-bar {
            position: relative; z-index: 15; padding: 0 24px;
            height: 60px; display: flex; align-items: center;
        }
        .insight-card {
            background: rgba(26, 26, 46, 0.85); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 20px; max-width: 900px; width: 100%;
            transition: opacity 0.4s;
        }
        .insight-date { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .insight-text { font-size: 13px; color: var(--text); line-height: 1.4; margin-top: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ── Main timeline container ────────────────────── */
        .timeline-viewport {
            position: absolute; top: 116px; left: 0; right: 0; bottom: 0;
            overflow-x: auto; overflow-y: hidden;
            mask-image: linear-gradient(to right, transparent, black 2%, black 98%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 2%, black 98%, transparent);
        }
        .timeline-viewport::-webkit-scrollbar { height: 6px; }
        .timeline-viewport::-webkit-scrollbar-track { background: transparent; }
        .timeline-viewport::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 3px; }

        .timeline-canvas {
            position: relative; height: 100%; min-width: 100%;
        }

        /* ── Date axis ──────────────────────────────────── */
        .date-axis {
            position: absolute; left: 0; right: 0; height: 32px;
            display: flex; align-items: center;
        }
        .date-label {
            position: absolute; width: var(--day-width); text-align: center;
            font-size: 11px; color: var(--text-dim); font-weight: 500;
            letter-spacing: 0.3px;
        }
        .date-label.today { color: var(--accent); font-weight: 700; }
        .date-line {
            position: absolute; width: 1px; top: 0; bottom: 0;
            background: rgba(124, 58, 237, 0.06);
            pointer-events: none; z-index: 0;
        }

        /* ── Zone labels ────────────────────────────────── */
        .zone-label {
            position: absolute; left: 12px; font-size: 10px; font-weight: 600;
            color: rgba(124,58,237,0.4); text-transform: uppercase; letter-spacing: 1px;
            writing-mode: vertical-lr; transform: rotate(180deg);
            z-index: 5;
        }

        /* ── Rivers (10+ days) ──────────────────────────── */
        .rivers-zone {
            position: absolute; left: 0; right: 0;
        }
        .river {
            position: absolute; border-radius: 20px; cursor: pointer;
            transition: box-shadow 0.3s, filter 0.3s;
            display: flex; align-items: center; overflow: hidden;
        }
        .river:hover {
            filter: brightness(1.2);
            z-index: 10;
        }
        .river-label {
            position: absolute; right: 8px; font-size: 11px; font-weight: 600;
            color: rgba(255,255,255,0.9); white-space: nowrap;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6);
            z-index: 2; pointer-events: none;
        }
        .river-sub-bubble {
            position: absolute; border-radius: 10px;
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
            font-size: 9px; color: rgba(255,255,255,0.8); padding: 2px 6px;
            white-space: nowrap; pointer-events: none; z-index: 1;
            animation: float-in-river 4s ease-in-out infinite alternate;
        }

        /* ── Growing bubbles (2-9 days) ─────────────────── */
        .bubbles-zone {
            position: absolute; left: 0; right: 0;
        }
        .growing-bubble {
            position: absolute; border-radius: 12px; cursor: pointer;
            background: var(--card-bg); transition: box-shadow 0.3s, transform 0.2s;
            display: flex; flex-direction: column; justify-content: center;
            padding: 6px 10px; overflow: hidden;
        }
        .growing-bubble:hover {
            transform: translateY(-2px);
            z-index: 10;
        }
        .bubble-name {
            font-size: 11px; font-weight: 600; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .bubble-keywords {
            display: flex; gap: 3px; flex-wrap: wrap; margin-top: 3px;
        }
        .bubble-keyword {
            font-size: 8px; padding: 1px 5px; border-radius: 6px;
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
        }
        .bubble-days {
            position: absolute; bottom: 3px; right: 6px;
            font-size: 9px; color: rgba(255,255,255,0.4); font-weight: 600;
        }

        /* ── Daily sparks (1 day) ───────────────────────── */
        .sparks-zone {
            position: absolute; left: 0; right: 0;
        }
        .spark {
            position: absolute; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 500; text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: hidden; padding: 3px;
            word-break: break-word; line-height: 1.1;
        }
        .spark:hover {
            transform: scale(1.15);
            z-index: 10;
        }
        .spark.today-spark {
            animation: pulse 2.5s ease-in-out infinite;
        }

        /* ── Animations ─────────────────────────────────── */
        @keyframes pulse {
            0%, 100% { opacity: 0.75; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.08); }
        }
        @keyframes float-in-river {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Modal ──────────────────────────────────────── */
        .modal-backdrop {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px); z-index: 100;
            display: none; align-items: center; justify-content: center;
            animation: fadeIn 0.2s;
        }
        .modal-backdrop.open { display: flex; }
        .modal-card {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 16px; max-width: 700px; width: 90%;
            max-height: 85vh; overflow-y: auto; padding: 28px;
            animation: fadeIn 0.25s;
        }
        .modal-card::-webkit-scrollbar { width: 5px; }
        .modal-card::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.3); border-radius: 3px; }
        .modal-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 22px; font-weight: 700; }
        .modal-close {
            width: 32px; height: 32px; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; background: none; color: var(--text-dim);
            cursor: pointer; font-size: 16px; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 6px;
            font-size: 11px; font-weight: 600; margin-right: 6px;
        }
        .badge-category { background: rgba(124,58,237,0.2); color: var(--accent); }
        .modal-section { margin-top: 20px; }
        .modal-section h3 {
            font-size: 13px; font-weight: 600; color: var(--text-dim);
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;
        }
        .strength-bars {
            display: flex; gap: 3px; align-items: flex-end; height: 60px;
        }
        .strength-bar {
            flex: 1; min-width: 8px; border-radius: 3px 3px 0 0;
            transition: height 0.3s;
            position: relative;
        }
        .strength-bar .bar-date {
            position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
            font-size: 8px; color: var(--text-dim); white-space: nowrap;
        }
        .evidence-list { list-style: none; }
        .evidence-list li {
            padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px; color: #ccc;
        }
        .evidence-list .ev-date {
            font-size: 10px; color: var(--accent); font-weight: 600;
            margin-right: 8px;
        }
        .grounding-item {
            padding: 10px 14px; background: rgba(234,179,8,0.06);
            border-left: 3px solid var(--color-core); border-radius: 0 8px 8px 0;
            margin-bottom: 8px; font-size: 13px; color: #ccc; line-height: 1.5;
        }
        .grounding-date { font-size: 10px; color: var(--color-core); font-weight: 600; margin-bottom: 4px; }
        .keyword-pills { display: flex; flex-wrap: wrap; gap: 6px; }
        .keyword-pill {
            padding: 4px 10px; border-radius: 8px; font-size: 12px;
            background: rgba(124,58,237,0.15); color: var(--accent); border: 1px solid rgba(124,58,237,0.2);
        }

        /* ── Empty / Error states ───────────────────────── */
        .state-msg {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 16px;
            z-index: 50;
        }
        .state-msg .icon { font-size: 48px; opacity: 0.3; }
        .state-msg .msg { font-size: 16px; color: var(--text-dim); text-align: center; line-height: 1.6; }
        .retry-btn {
            padding: 8px 20px; background: var(--accent); color: white;
            border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
            transition: background 0.2s;
        }
        .retry-btn:hover { background: var(--accent-hover); }

        /* ── Lifecycle badge colors ─────────────────────── */
        .lc-emerging { background: rgba(34,197,94,0.2); color: var(--color-emerging); }
        .lc-active { background: rgba(124,58,237,0.2); color: var(--color-active); }
        .lc-core { background: rgba(234,179,8,0.2); color: var(--color-core); }
        .lc-fading { background: rgba(107,114,128,0.2); color: var(--color-fading); }
        .lc-dormant { background: rgba(55,65,81,0.2); color: var(--color-dormant); }

        /* ── Legend ──────────────────────────────────────── */
        .legend {
            position: fixed; bottom: 16px; right: 16px; z-index: 20;
            background: rgba(26,26,46,0.9); backdrop-filter: blur(8px);
            border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; display: flex; gap: 14px; font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; color: var(--text-dim); }
        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <a href="/" class="back-link">&#8592; Dashboard</a>
            <h1><span>Interest</span> Timeline</h1>
            <span class="meta" id="header-meta"></span>
        </div>
        <div class="scroll-controls">
            <button class="scroll-btn" id="btn-scroll-left" title="Auto-scroll to past">&#9664;&#9664;</button>
            <button class="scroll-btn active" id="btn-scroll-pause" title="Pause">&#9646;&#9646;</button>
            <button class="scroll-btn" id="btn-scroll-right" title="Auto-scroll to future">&#9654;&#9654;</button>
        </div>
    </div>

    <!-- Insight bar -->
    <div class="insight-bar">
        <div class="insight-card" id="insight-card">
            <div class="insight-date" id="insight-date"></div>
            <div class="insight-text" id="insight-text">Scroll through your timeline to see daily insights...</div>
        </div>
    </div>

    <!-- Timeline viewport -->
    <div class="timeline-viewport" id="timeline-viewport">
        <div class="timeline-canvas" id="timeline-canvas">
            <!-- Zone labels -->
            <div class="zone-label" id="zone-label-rivers" style="top: 20px;">Rivers</div>
            <div class="zone-label" id="zone-label-bubbles">Bubbles</div>
            <div class="zone-label" id="zone-label-sparks">Sparks</div>

            <!-- Date lines rendered dynamically -->
            <!-- Rivers zone (10+ days) -->
            <div class="rivers-zone" id="rivers-zone"></div>
            <!-- Growing bubbles zone (2-9 days) -->
            <div class="bubbles-zone" id="bubbles-zone"></div>
            <!-- Date axis (center) -->
            <div class="date-axis" id="date-axis"></div>
            <!-- Daily sparks zone (1 day) -->
            <div class="sparks-zone" id="sparks-zone"></div>
        </div>
    </div>

    <!-- Legend -->
    <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-emerging)"></div> Emerging</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-active)"></div> Active</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-core)"></div> Core</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-fading)"></div> Fading</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--color-dormant)"></div> Dormant</div>
    </div>

    <!-- Modal -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal-card" id="modal-card"></div>
    </div>

    <script>
    (function() {
        'use strict';

        // ── Constants ──────────────────────────────────────
        const DAY_W = 130;
        const SCROLL_SPEED = 80; // px per second
        const LIFECYCLE_COLORS = {
            emerging: '#22c55e', active: '#7c3aed', core: '#eab308',
            fading: '#6b7280', dormant: '#374151'
        };
        const STRENGTH_H = { dominant: 30, strong: 20, moderate: 12, mild: 8, weak: 6 };
        const STRENGTH_NUM = { dominant: 5, strong: 4, moderate: 3, mild: 2, weak: 1 };

        // ── State ──────────────────────────────────────────
        let data = null;
        let scrollDir = 0; // -1 left, 0 paused, 1 right
        let lastFrame = 0;
        let allDates = [];
        let dailyInsights = {};

        // ── DOM refs ───────────────────────────────────────
        const viewport = document.getElementById('timeline-viewport');
        const canvas = document.getElementById('timeline-canvas');
        const riversZone = document.getElementById('rivers-zone');
        const bubblesZone = document.getElementById('bubbles-zone');
        const sparksZone = document.getElementById('sparks-zone');
        const dateAxis = document.getElementById('date-axis');
        const insightDate = document.getElementById('insight-date');
        const insightText = document.getElementById('insight-text');
        const insightCard = document.getElementById('insight-card');
        const headerMeta = document.getElementById('header-meta');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalCard = document.getElementById('modal-card');

        // ── Scroll controls ────────────────────────────────
        const btnLeft = document.getElementById('btn-scroll-left');
        const btnPause = document.getElementById('btn-scroll-pause');
        const btnRight = document.getElementById('btn-scroll-right');

        function setScrollDir(dir) {
            scrollDir = dir;
            btnLeft.classList.toggle('active', dir === -1);
            btnPause.classList.toggle('active', dir === 0);
            btnRight.classList.toggle('active', dir === 1);
        }
        btnLeft.addEventListener('click', function() { setScrollDir(scrollDir === -1 ? 0 : -1); });
        btnPause.addEventListener('click', function() { setScrollDir(0); });
        btnRight.addEventListener('click', function() { setScrollDir(scrollDir === 1 ? 0 : 1); });

        // ── Auto-scroll loop ───────────────────────────────
        function scrollLoop(ts) {
            if (lastFrame && scrollDir !== 0) {
                var dt = (ts - lastFrame) / 1000;
                viewport.scrollLeft += scrollDir * SCROLL_SPEED * dt;
            }
            lastFrame = ts;
            requestAnimationFrame(scrollLoop);
        }
        requestAnimationFrame(scrollLoop);

        // ── Insight update on scroll ───────────────────────
        viewport.addEventListener('scroll', function() {
            updateInsight();
        });

        function updateInsight() {
            if (!allDates.length) return;
            var center = viewport.scrollLeft + viewport.clientWidth / 2;
            var idx = Math.round(center / DAY_W);
            idx = Math.max(0, Math.min(idx, allDates.length - 1));
            var d = allDates[idx];
            if (!d) return;
            insightDate.textContent = formatDateLong(d);
            var ins = dailyInsights[d];
            var text = ins ? (typeof ins === 'object' ? (ins.headline || ins.detail || JSON.stringify(ins)) : ins) : null;
            if (text) {
                insightText.textContent = text;
                insightCard.style.opacity = '1';
            } else {
                insightText.textContent = 'No insight for this day.';
                insightCard.style.opacity = '0.5';
            }
        }

        // ── Fetch & render ─────────────────────────────────
        fetchData();

        async function fetchData() {
            try {
                var resp = await fetch('/api/interests/timeline');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                data = await resp.json();
                if (!data.interests || data.interests.length === 0) {
                    showEmpty();
                    return;
                }
                render(data);
            } catch(e) {
                showError(e.message);
            }
        }

        function showEmpty() {
            canvas.innerHTML = '<div class="state-msg"><div class="icon">&#9679;</div>' +
                '<div class="msg">No interests collected yet.<br>Data will appear after the first pipeline run.</div></div>';
            document.querySelector('.legend').style.display = 'none';
        }

        function showError(msg) {
            canvas.innerHTML = '<div class="state-msg"><div class="icon">&#9888;</div>' +
                '<div class="msg">Failed to load interest timeline.<br><span style="font-size:13px;color:#ef4444">' +
                esc(msg) + '</span></div>' +
                '<button class="retry-btn" onclick="location.reload()">Retry</button></div>';
            document.querySelector('.legend').style.display = 'none';
        }

        // ── Main render ────────────────────────────────────
        function render(d) {
            dailyInsights = d.daily_insights || {};

            // Build complete date range
            var allFirst = d.interests.map(function(i) { return i.first_seen; });
            var allLast = d.interests.map(function(i) { return i.last_seen; });
            var minDate = allFirst.sort()[0];
            var maxDate = allLast.sort().reverse()[0];
            allDates = dateRange(minDate, maxDate);

            var totalW = allDates.length * DAY_W + 60; // padding
            canvas.style.width = totalW + 'px';

            // Header meta
            headerMeta.innerHTML = '<b>' + allDates.length + '</b> days collected &middot; <b>' +
                d.interests.length + '</b> interests tracked';

            // Layout zones based on viewport height
            var vh = viewport.clientHeight;
            var dateAxisY = Math.floor(vh * 0.62);
            var riversTop = 10;
            var riversBottom = dateAxisY - 30;
            var riversH = riversBottom - riversTop;
            var bubblesTop = dateAxisY + 36;
            var bubblesBottom = Math.floor(vh * 0.78);
            var bubblesH = bubblesBottom - bubblesTop;
            var sparksTop = bubblesBottom + 10;
            var sparksBottom = vh - 20;
            var sparksH = sparksBottom - sparksTop;

            riversZone.style.top = riversTop + 'px';
            riversZone.style.height = riversH + 'px';
            bubblesZone.style.top = bubblesTop + 'px';
            bubblesZone.style.height = bubblesH + 'px';
            sparksZone.style.top = sparksTop + 'px';
            sparksZone.style.height = sparksH + 'px';
            dateAxis.style.top = dateAxisY + 'px';

            // Zone labels
            document.getElementById('zone-label-rivers').style.top = (riversTop + 10) + 'px';
            document.getElementById('zone-label-bubbles').style.top = (bubblesTop + 5) + 'px';
            document.getElementById('zone-label-sparks').style.top = (sparksTop + 5) + 'px';

            // Classify interests
            var rivers = [], bubbles = [], sparks = [];
            for (var i = 0; i < d.interests.length; i++) {
                var interest = d.interests[i];
                if (interest.total_days_active >= 10) rivers.push(interest);
                else if (interest.total_days_active >= 2) bubbles.push(interest);
                else sparks.push(interest);
            }

            // Render date axis + date lines
            renderDateAxis(dateAxisY);
            renderDateLines(riversTop, sparksBottom);
            renderRivers(rivers, riversH);
            renderBubbles(bubbles, bubblesH);
            renderSparks(sparks, sparksH);

            // Scroll to end (today)
            viewport.scrollLeft = totalW;
            // Small delay then update insight
            setTimeout(function() { updateInsight(); }, 100);
        }

        // ── Date axis ──────────────────────────────────────
        function renderDateAxis(axisY) {
            dateAxis.innerHTML = '';
            for (var i = 0; i < allDates.length; i++) {
                var label = document.createElement('div');
                label.className = 'date-label';
                var today = new Date().toISOString().slice(0, 10);
                if (allDates[i] === today) label.classList.add('today');
                label.style.left = (i * DAY_W) + 'px';
                label.textContent = formatDateShort(allDates[i]);
                dateAxis.appendChild(label);
            }
        }

        function renderDateLines(top, bottom) {
            // Remove old lines
            var old = canvas.querySelectorAll('.date-line');
            for (var o = 0; o < old.length; o++) old[o].remove();

            for (var i = 0; i < allDates.length; i++) {
                var line = document.createElement('div');
                line.className = 'date-line';
                line.style.left = (i * DAY_W + DAY_W / 2) + 'px';
                line.style.top = top + 'px';
                line.style.height = (bottom - top) + 'px';
                canvas.appendChild(line);
            }
        }

        // ── Rivers ─────────────────────────────────────────
        function renderRivers(rivers, zoneH) {
            riversZone.innerHTML = '';
            if (!rivers.length) return;

            // Sort by first_seen so we can stack
            rivers.sort(function(a, b) { return a.first_seen < b.first_seen ? -1 : 1; });

            var spacing = 6;
            // Calculate total height needed
            var totalNeeded = 0;
            for (var r = 0; r < rivers.length; r++) {
                totalNeeded += (STRENGTH_H[rivers[r].current_strength] || 12) + spacing;
            }
            var scale = totalNeeded > zoneH ? zoneH / totalNeeded : 1;
            var yOffset = 8;

            for (var r = 0; r < rivers.length; r++) {
                var interest = rivers[r];
                var startIdx = dateIndex(interest.first_seen);
                var endIdx = dateIndex(interest.last_seen);
                var x = startIdx * DAY_W + 10;
                var w = Math.max((endIdx - startIdx + 1) * DAY_W - 20, DAY_W - 20);
                var h = Math.max(Math.floor((STRENGTH_H[interest.current_strength] || 12) * scale), 6);
                var color = LIFECYCLE_COLORS[interest.lifecycle_status] || LIFECYCLE_COLORS.active;

                var el = document.createElement('div');
                el.className = 'river';
                el.style.left = x + 'px';
                el.style.top = yOffset + 'px';
                el.style.width = w + 'px';
                el.style.height = h + 'px';
                el.style.background = 'linear-gradient(90deg, ' + hexAlpha(color, 0.6) + ', ' + hexAlpha(color, 0.85) + ', ' + hexAlpha(color, 0.6) + ')';
                el.style.boxShadow = '0 0 ' + (h > 15 ? 16 : 8) + 'px ' + hexAlpha(color, 0.35);
                el.dataset.id = interest.id;
                el.addEventListener('click', openModal);

                // Label
                var lbl = document.createElement('div');
                lbl.className = 'river-label';
                lbl.textContent = interest.name;
                lbl.style.top = '50%';
                lbl.style.transform = 'translateY(-50%)';
                el.appendChild(lbl);

                // Sub-bubbles for keywords (placed at high-evidence dates)
                if (interest.keywords && interest.keywords.length && h >= 14) {
                    var dailyEntries = Object.entries(interest.daily || {});
                    dailyEntries.sort(function(a, b) { return (b[1].evidence_count || 0) - (a[1].evidence_count || 0); });
                    var maxBubbles = Math.min(interest.keywords.length, 3, dailyEntries.length);
                    for (var k = 0; k < maxBubbles; k++) {
                        var bub = document.createElement('div');
                        bub.className = 'river-sub-bubble';
                        bub.textContent = interest.keywords[k];
                        var bubDateIdx = dateIndex(dailyEntries[k] ? dailyEntries[k][0] : interest.first_seen);
                        var bubX = (bubDateIdx - startIdx) * DAY_W + 10;
                        bubX = Math.max(4, Math.min(bubX, w - 50));
                        bub.style.left = bubX + 'px';
                        bub.style.top = Math.max(1, Math.floor((h - 16) / 2)) + 'px';
                        bub.style.animationDelay = (k * 0.7) + 's';
                        el.appendChild(bub);
                    }
                }

                riversZone.appendChild(el);
                yOffset += h + Math.floor(spacing * scale);
            }
        }

        // ── Bubbles ────────────────────────────────────────
        function renderBubbles(bubbles, zoneH) {
            bubblesZone.innerHTML = '';
            if (!bubbles.length) return;

            // Sort by first_seen
            bubbles.sort(function(a, b) { return a.first_seen < b.first_seen ? -1 : 1; });

            // Simple row packing
            var rows = []; // each row: [{endX, y}]
            var rowH = 0;

            for (var b = 0; b < bubbles.length; b++) {
                var interest = bubbles[b];
                var startIdx = dateIndex(interest.first_seen);
                var endIdx = dateIndex(interest.last_seen);
                var x = startIdx * DAY_W + 6;
                var w = Math.max((endIdx - startIdx + 1) * DAY_W - 12, DAY_W - 12);
                var strengthH = { dominant: 58, strong: 50, moderate: 42, mild: 36, weak: 30 };
                var h = strengthH[interest.current_strength] || 36;
                var color = LIFECYCLE_COLORS[interest.lifecycle_status] || LIFECYCLE_COLORS.active;

                // Find first row that fits
                var placed = false;
                for (var ri = 0; ri < rows.length; ri++) {
                    var fits = true;
                    for (var ci = 0; ci < rows[ri].length; ci++) {
                        if (x < rows[ri][ci].endX + 4 && x + w > rows[ri][ci].x - 4) {
                            fits = false; break;
                        }
                    }
                    if (fits) {
                        rows[ri].push({ x: x, endX: x + w, y: ri });
                        renderOneBubble(interest, x, ri * (h + 6), w, h, color);
                        placed = true;
                        break;
                    }
                }
                if (!placed) {
                    rows.push([{ x: x, endX: x + w, y: rows.length }]);
                    renderOneBubble(interest, x, rows.length * (h + 6) - (h + 6), w, h, color);
                }
            }
        }

        function renderOneBubble(interest, x, y, w, h, color) {
            var el = document.createElement('div');
            el.className = 'growing-bubble';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.width = w + 'px';
            el.style.height = h + 'px';
            el.style.border = '1px solid ' + hexAlpha(color, 0.4);
            el.style.boxShadow = '0 0 10px ' + hexAlpha(color, 0.15);
            el.dataset.id = interest.id;
            el.addEventListener('click', openModal);

            var name = document.createElement('div');
            name.className = 'bubble-name';
            name.style.color = color;
            name.textContent = interest.name;
            el.appendChild(name);

            // Keywords
            if (interest.keywords && interest.keywords.length && h >= 38) {
                var kw = document.createElement('div');
                kw.className = 'bubble-keywords';
                var max = Math.min(interest.keywords.length, 3);
                for (var k = 0; k < max; k++) {
                    var pill = document.createElement('span');
                    pill.className = 'bubble-keyword';
                    pill.textContent = interest.keywords[k];
                    kw.appendChild(pill);
                }
                el.appendChild(kw);
            }

            // Days badge
            var days = document.createElement('div');
            days.className = 'bubble-days';
            days.textContent = interest.total_days_active + 'd';
            el.appendChild(days);

            bubblesZone.appendChild(el);
        }

        // ── Sparks ─────────────────────────────────────────
        function renderSparks(sparks, zoneH) {
            sparksZone.innerHTML = '';
            if (!sparks.length) return;

            var today = new Date().toISOString().slice(0, 10);

            // Group by date column
            var byDate = {};
            for (var s = 0; s < sparks.length; s++) {
                var d = sparks[s].first_seen;
                if (!byDate[d]) byDate[d] = [];
                byDate[d].push(sparks[s]);
            }

            for (var date in byDate) {
                var col = byDate[date];
                var idx = dateIndex(date);
                var centerX = idx * DAY_W + DAY_W / 2;

                for (var c = 0; c < col.length; c++) {
                    var interest = col[c];
                    var size = { dominant: 40, strong: 36, moderate: 30, mild: 26, weak: 24 };
                    var sz = size[interest.current_strength] || 28;
                    var color = LIFECYCLE_COLORS[interest.lifecycle_status] || LIFECYCLE_COLORS.active;

                    var el = document.createElement('div');
                    el.className = 'spark';
                    if (date === today) el.classList.add('today-spark');
                    el.style.left = (centerX - sz / 2) + 'px';
                    el.style.top = (c * (sz + 6) + 4) + 'px';
                    el.style.width = sz + 'px';
                    el.style.height = sz + 'px';
                    el.style.background = hexAlpha(color, 0.25);
                    el.style.border = '1px solid ' + hexAlpha(color, 0.45);
                    el.style.boxShadow = '0 0 8px ' + hexAlpha(color, 0.2);
                    el.style.color = color;
                    el.dataset.id = interest.id;
                    el.addEventListener('click', openModal);

                    // Truncated name
                    var maxChars = Math.floor(sz / 5);
                    var txt = interest.name.length > maxChars ? interest.name.slice(0, maxChars) : interest.name;
                    el.textContent = txt;
                    el.title = interest.name;

                    sparksZone.appendChild(el);
                }
            }
        }

        // ── Modal ──────────────────────────────────────────
        async function openModal(e) {
            var id = parseInt(this.dataset.id || e.currentTarget.dataset.id);
            if (!id) return;

            modalCard.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-dim)">Loading...</div>';
            modalBackdrop.classList.add('open');

            try {
                var resp = await fetch('/api/interests/' + id);
                if (!resp.ok) throw new Error('Not found');
                var detail = await resp.json();
                renderModal(detail);
            } catch(err) {
                modalCard.innerHTML = '<div style="padding:40px;text-align:center;color:#ef4444">Failed to load details.</div>';
            }
        }

        function renderModal(d) {
            var lcClass = 'lc-' + (d.lifecycle_status || 'active');
            var color = LIFECYCLE_COLORS[d.lifecycle_status] || LIFECYCLE_COLORS.active;

            var html = '<div class="modal-header"><div>' +
                '<div class="modal-title">' + esc(d.name) + '</div>' +
                '<div style="margin-top:6px">' +
                '<span class="badge badge-category">' + esc(d.category) + '</span>' +
                '<span class="badge ' + lcClass + '">' + esc(d.lifecycle_status) + '</span>' +
                '<span style="font-size:12px;color:var(--text-dim);margin-left:8px">' +
                d.total_days_active + ' days &middot; ' + esc(d.first_seen) + ' to ' + esc(d.last_seen) + '</span>' +
                '</div></div>' +
                '<button class="modal-close" id="modal-close-btn">&times;</button></div>';

            // Keywords
            if (d.keywords && d.keywords.length) {
                html += '<div class="keyword-pills">';
                for (var k = 0; k < d.keywords.length; k++) {
                    html += '<span class="keyword-pill">' + esc(d.keywords[k]) + '</span>';
                }
                html += '</div>';
            }

            // Strength history bars
            if (d.daily_history && d.daily_history.length) {
                html += '<div class="modal-section"><h3>Strength History</h3><div class="strength-bars">';
                for (var i = 0; i < d.daily_history.length; i++) {
                    var dh = d.daily_history[i];
                    var hPct = ((STRENGTH_NUM[dh.strength] || 1) / 5) * 100;
                    html += '<div class="strength-bar" style="height:' + hPct + '%;background:' +
                        hexAlpha(color, 0.7) + '" title="' + esc(dh.date) + ': ' + esc(dh.strength) +
                        ' (' + dh.evidence_count + ' evidence)">' +
                        '<div class="bar-date">' + dh.date.slice(5) + '</div></div>';
                }
                html += '</div></div>';
            }

            // Evidence consumed
            if (d.daily_history && d.daily_history.length) {
                html += '<div class="modal-section"><h3>Content Consumed</h3><ul class="evidence-list">';
                for (var i = 0; i < d.daily_history.length; i++) {
                    var dh = d.daily_history[i];
                    if (dh.top_evidence && dh.top_evidence.length) {
                        for (var j = 0; j < dh.top_evidence.length; j++) {
                            html += '<li><span class="ev-date">' + dh.date.slice(5) + '</span>' +
                                esc(dh.top_evidence[j]) + '</li>';
                        }
                    }
                }
                html += '</ul></div>';
            }

            // Grounding
            if (d.grounding && d.grounding.length) {
                html += '<div class="modal-section"><h3>Real-World Context</h3>';
                for (var i = 0; i < d.grounding.length; i++) {
                    html += '<div class="grounding-item"><div class="grounding-date">' +
                        esc(d.grounding[i].date) + '</div>' + esc(d.grounding[i].content) + '</div>';
                }
                html += '</div>';
            }

            // Notes
            if (d.notes) {
                html += '<div class="modal-section"><h3>Notes</h3><p style="font-size:13px;color:#aaa;line-height:1.5">' +
                    esc(d.notes) + '</p></div>';
            }

            modalCard.innerHTML = html;

            // Bind close
            document.getElementById('modal-close-btn').addEventListener('click', closeModal);
        }

        function closeModal() { modalBackdrop.classList.remove('open'); }
        modalBackdrop.addEventListener('click', function(e) {
            if (e.target === modalBackdrop) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        // ── Helpers ────────────────────────────────────────
        function dateIndex(d) {
            var idx = allDates.indexOf(d);
            return idx >= 0 ? idx : 0;
        }

        function dateRange(start, end) {
            var dates = [];
            var cur = new Date(start + 'T00:00:00');
            var last = new Date(end + 'T00:00:00');
            while (cur <= last) {
                dates.push(cur.toISOString().slice(0, 10));
                cur.setDate(cur.getDate() + 1);
            }
            return dates;
        }

        function formatDateShort(d) {
            var parts = d.split('-');
            var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]);
        }

        function formatDateLong(d) {
            var dt = new Date(d + 'T00:00:00');
            return dt.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }

        function hexAlpha(hex, alpha) {
            var r = parseInt(hex.slice(1, 3), 16);
            var g = parseInt(hex.slice(3, 5), 16);
            var b = parseInt(hex.slice(5, 7), 16);
            return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
        }

        function esc(s) {
            if (!s) return '';
            var d = document.createElement('div');
            d.textContent = String(s);
            return d.innerHTML;
        }
    })();
    </script>
</body>
